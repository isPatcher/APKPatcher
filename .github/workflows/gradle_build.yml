name: Build Jar

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v6
      - name: Build with Gradle
        run: ./gradlew fatJar
      - uses: actions/upload-artifact@v7
        with:
          name: APKPatcher
          path: build/libs